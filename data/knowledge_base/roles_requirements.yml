    requirements:
      min_experience_years: 1
      hard_skills:
        - "деплой моделей"
        - "CI/CD"
        - "контейнеризация"
        - "мониторинг моделей"
        - "ML lifecycle"
      tools:
        - "Docker"
        - "Git"
        - "Kubernetes"
        - "MLflow"
        - "Linux"
        - "Python"
      project_experience_required: true
      project_experience_preferred: true
      salary_limit: 250000
      min_education_level: "неоконченное высшее"
      min_english_level: "A2"
