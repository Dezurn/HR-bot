    - Роль [Data Engineer]{"entity": "role", "value": "data_engineer"}, зарплата [220000](number), формат [гибрид](work_format)
    - Хочу на [Data Analyst]{"entity": "role", "value": "data_analyst"}, опыт [1](number) год, образование [высшее](education_level)

