version: "3.1"

nlu:
- intent: greet
  examples: |
    - hey
    - hello
    - hi
    - hello there
    - good morning
    - good evening
    - moin
    - hey there
    - let's go
    - hey dude
    - goodmorning
    - goodevening
    - good afternoon

- intent: goodbye
  examples: |
    - cu
    - good by
    - cee you later
    - good night
    - bye
    - goodbye
    - have a nice day
    - see you around
    - bye bye
    - see you later

- intent: affirm
  examples: |
    - yes
    - y
    - indeed
    - of course
    - that sounds good
    - correct

- intent: deny
  examples: |
    - no
    - n
    - never
    - I don't think so
    - don't like that
    - no way
    - not really

- intent: mood_great
  examples: |
    - perfect
    - great
    - amazing
    - feeling like a king
    - wonderful
    - I am feeling very good
    - I am great
    - I am amazing
    - I am going to save the world
    - super stoked
    - extremely good
    - so so perfect
    - so good
    - so perfect

- intent: mood_unhappy
  examples: |
    - my day was horrible
    - I am sad
    - I don't feel very well
    - I am disappointed
    - super sad
    - I'm so sad
    - sad
    - very sad
    - unhappy
    - not good
    - not very good
    - extremly sad
    - so saad
    - so sad

- intent: bot_challenge
  examples: |
    - are you a bot?
    - are you a human?
    - am I talking to a bot?
    - am I talking to a human?

- intent: provide_profile_info
  examples: |
    - Я откликаюсь на Data Engineer
    - Хочу на позицию Data Scientist
    - Интересует роль MLOps Engineer
    - Хочу работать Project Manager
    - У меня [2](experience_years) года опыта
    - Опыт [1.5](experience_years) года
    - Я работаю в этой сфере [3](experience_years) года
    - У меня около [1](experience_years) года проектного опыта
    - Я знаю [Docker](skill), [SQL](skill) и [Python](skill)
    - Мои навыки: [Docker](skill), [Airflow](skill), [PostgreSQL](skill)
    - Работал с [Python](skill), [pandas](skill) и [SQL](skill)
    - Умею работать с [Jira](skill), [Confluence](skill) и [Excel](skill)

- intent: provide_skill_evidence
  examples: |
    - Я писал Dockerfile для FastAPI-сервиса
    - Использовал docker-compose с PostgreSQL
    - Смотрел docker logs и исправлял проблемы с env variables
    - Настраивал контейнеры для backend-сервиса
    - Я запускал сервисы в Docker и проверял логи
    - Делал docker-compose файл для локальной разработки
    - Использовал Docker в учебном проекте
    - Настраивал окружение через env variables
