version: "3.1"

stories:
  - story: happy path from greeting
    steps:
      - intent: greet
      - action: utter_greet
      - action: candidate_form
      - active_loop: candidate_form
      - active_loop: null
      - action: action_calculate_screening_result
      - action: action_choose_followup_skill

  - story: happy path from direct screening request
    steps:
      - intent: start_screening
      - action: utter_greet
      - action: candidate_form
      - active_loop: candidate_form
      - active_loop: null
      - action: action_calculate_screening_result
      - action: action_choose_followup_skill

  - story: user asks who the bot is then starts screening
    steps:
      - intent: bot_challenge
      - action: utter_iamabot
      - intent: start_screening
      - action: utter_greet
      - action: candidate_form
      - active_loop: candidate_form
      - active_loop: null
      - action: action_calculate_screening_result
      - action: action_choose_followup_skill

  - story: user say goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - story: user want to atop
    steps:
      - intent: stop
      - action: utter_stop
