version: "3.1"

rules:

  - rule: Say goodbye anytime the user says goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Say 'I am a bot' anytime the user challenges
    steps:
      - intent: bot_challenge
      - action: utter_iamabot

  - rule: Stop interview before form
    steps:
      - intent: stop
      - action: utter_stop

  - rule: Start candidate form from greeting
    steps:
      - intent: greet
      - action: utter_greet
      - action: candidate_form
      - active_loop: candidate_form

  - rule: Start candidate form from screening
    steps:
      - intent: start_screening
      - action: utter_greet
      - action: candidate_form
      - active_loop: candidate_form

  - rule: Submit candidate form
    condition:
      - active_loop: candidate_form
    steps:
      - action: candidate_form
      - active_loop: null
      - action: action_calculate_screening_result

  - rule: Stop candidate form
    condition:
      - active_loop: candidate_form
    steps:
      - intent: stop
      - action: action_deactivate_loop
      - active_loop: null
      - action: utter_stop
